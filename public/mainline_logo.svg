  <circle cx="515" cy="617" r="44" fill="#fff"/>
  <circle cx="889" cy="610" r="78" fill="#000"/>
  <circle cx="879" cy="617" r="44" fill="#fff"/>
  <circle cx="697" cy="720" r="202" fill="#000"/>
  <circle cx="697" cy="720" r="151" fill="#fff"/>

