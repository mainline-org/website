<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="230 260 940 940" role="img" aria-labelledby="title desc">
  <title id="title">Monkey hanging mark</title>
  <desc id="desc">Transparent vector mark of a black monkey hanging from a bar with a small scroll and orange seal.</desc>
  <!-- bar and limbs -->
  <line x1="335" y1="358" x2="1075" y2="358" stroke="#000" stroke-width="56" stroke-linecap="round"/>
